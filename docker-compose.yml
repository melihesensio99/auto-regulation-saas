version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: smartcoaching_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123!
      POSTGRES_DB: smartcoachingdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: smartcoaching_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: smartcoaching_rabbitmq
    ports:
      - "5672:5672" # RabbitMQ mesajlaşma portu
      - "15672:15672" # RabbitMQ Yönetim Paneli (UI) portu
    restart: unless-stopped

volumes:
  pgdata:
